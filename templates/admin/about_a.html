<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Model Analysis</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .header {
            background: #343a40;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .graph-img {
            width: 100%;
            height: 300px;
            object-fit: contain;
        }

        .best-model {
            background: #28a745;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
    <div class="row">
<div class="col-md-2 sidebar">
            <h4 class="text-center">Admin</h4>

            <a href="/admin">Dashboard</a>
            <a href="/admin/users"> Manage Users</a>
            <a href="#">Transactions</a>
            <a href="#">Fraud Logs</a>
            <a href="/logout"> Logout</a>
        </div>
        <div class="col-md-10 p-4">
    <!-- HEADER -->
    

    <div class="container mt-4">

        <!-- BEST MODEL -->
        <div class="best-model mb-4">
            <h4> Best Model</h4>
            <h2>{{ best_model }}</h2>
            <p>ROC-AUC Score: <strong>{{ best_score }}</strong></p>
        </div>

        <!-- GRAPH GRID -->
        <div class="row g-4">

            <!-- Bar Chart -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">Model Comparison</h5>
                    <img src="{{ graphs.bar }}" class="graph-img">
                </div>
            </div>

            <!-- Line Chart -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">Performance Trend</h5>
                    <img src="{{ graphs.line }}" class="graph-img">
                </div>
            </div>

            <!-- Point Plot -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">Model Ranking</h5>
                    <img src="{{ graphs.point }}" class="graph-img">
                </div>
            </div>

            <!-- Box Plot -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">Score Distribution</h5>
                    <img src="{{ graphs.box }}" class="graph-img">
                </div>
            </div>

            <!-- XGBoost Metrics -->
            {% if graphs.xgb_metrics %}
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">XGBoost Metrics</h5>
                    <img src="{{ graphs.xgb_metrics }}" class="graph-img">
                </div>
            </div>
            {% endif %}

            <!-- ROC Line -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-center">ROC-AUC Comparison</h5>
                    <img src="{{ graphs.roc_line }}" class="graph-img">
                </div>
            </div>

        </div>

    </div>
    </div>
</div>
</div>
</body>
</html>
