<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">Admin</h4>

            <a href="/admin">Dashboard</a>
            <a href="/admin/users"> Manage Users</a>
            <a href="#"> Transactions</a>
            <a href="#">Fraud Logs</a>
            <a href="/logout"> Logout</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 content bg-light">

            <h2 class="mb-4">Dashboard</h2>

            <!-- STATS -->
            <div class="row text-center">
                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h5>Total Users</h5>
                        <h2>{{ total_users }}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h5>Total Transactions</h5>
                        <h2>{{ total_txn }}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3">
                        <h5>High Risk</h5>
                        <h2 class="text-danger">{{ high }}</h2>
                    </div>
                </div>
            </div>

            <!-- CHARTS ROW -->
<div class="row mt-4">

    <!-- PIE CHART -->
    <div class="col-md-6" style="width: 500px;">
        <div class="card p-3 shadow">
            <h5 class="text-center">Fraud Risk Distribution</h5>
            <canvas id="riskChart"></canvas>
        </div>
    </div>

    <!-- LINE CHART -->
    <div class="col-md-6">
        <div class="card p-3 shadow">
            <h5 class="text-center">Transactions (Last 7 Days)</h5>
            <canvas id="lineChart"></canvas>
        </div>
    </div>

</div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById("riskChart"), {
    type: "pie",
    data: {
        labels: ["High", "Medium", "Low"],
        datasets: [{
            data: [{{ high }}, {{ medium }}, {{ low }}],
            backgroundColor: ["red", "orange", "green"]
        }]
    }
});

const labels = {{ chart_data | map(attribute=0) | list | tojson }};
const values = {{ chart_data | map(attribute=1) | list | tojson }};

new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: labels.reverse(),
        datasets: [{
            label: "Transactions",
            data: values.reverse(),
            borderColor: "blue",
            fill: false
        }]
    }
});
</script>

</body>
</html>
